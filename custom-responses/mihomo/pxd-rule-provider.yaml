dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  cache-algorithm: arc
  prefer-h3: false
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - rule-set:geosite-private
    - "+.lan"
    - "+.local"
    - "+.msftncsi.com"
    - "+.msftconnecttest.com"
  default-nameserver: *dns_ru
  nameserver: *dns_proxy
  proxy-server-nameserver: *dns_ru
  nameserver-policy:
    rule-set:geosite-private:
      - system
    rule-set:ads-all:
      - rcode://refused
    "*.lan,*.local": [192.168.1.1, system]
    "rule-set:youtube,category-ban-ru,whatsapp-domains,telegram-domains,discord-domains": *dns_proxy
    "rule-set:geosite-ru": *dns_ru

proxy-providers:
  subscription:
    type: http
    url: "$subscription_url$"
    path: ./proxy_providers/subscription.yaml
    interval: $profile-update-interval$
    health-check:
      enable: true
      lazy: true
      interval: 600
      url: https://captive.apple.com/generate_204
    proxy: DIRECT
    header:
      User-Agent:
      - "$User-Agent$"
      x-hwid:
      - "$x-hwid$"
      x-device-os:
      - "$x-device-os$"
      x-ver-os:
      - "$x-ver-os$"
      x-device-model:
      - "$x-device-model$"

proxy-groups:
  - name: 🏳️‍🌈 Proxy
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png
    type: select
    url: https://www.gstatic.com/generate_204
    remnawave:
      include-proxies: false
    include-all: true
    exclude-filter: "^🇩🇪|^🇷🇺 \\w+"
    proxies:
      - 🔓 No VPN
      - 🏳️‍🌈 Fastest

  - name: 🇷🇺 Proxy
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hijacking.png
    type: select
    remnawave:
      include-proxies: false
    include-all: true
    exclude-filter: "🇩🇪|🇨🇭|🇸🇪 "
    proxies:
      - 🔓 No VPN
      - 🇷🇺 Fastest
    use:
      - subscription

  - name: Discord
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Discord.png
    type: select
    remnawave:
      include-proxies: false
    include-all: true
    exclude-filter: "^🇩🇪"
    proxies:
      - 🔓 No VPN
      - 🇷🇺 Proxy
      - 🏳️‍🌈 Proxy
    use:
      - subscription

  - name: 🎮 Games
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Game.png
    type: select
    remnawave:
      include-proxies: false
    include-all: true
    exclude-filter: "^🇩🇪"
    proxies:
      - 🔓 No VPN
      - 🇷🇺 Proxy
      - 🏳️‍🌈 Proxy
    use:
      - subscription

  - name: Telegram
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Telegram.png
    type: select
    remnawave:
      include-proxies: false
    include-all: true
    exclude-filter: "^🇩🇪"
    proxies:
      - 🔓 No VPN
      - 🏳️‍🌈 Proxy
      - 🇷🇺 Proxy
    use:
      - subscription

  - name: YouTube
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png
    type: select
    remnawave:
      include-proxies: false
    include-all: true
    exclude-filter: "^🇩🇪"
    proxies:
      - 🔓 No VPN
      - 🇷🇺 Proxy
      - 🏳️‍🌈 Proxy
    use:
      - subscription
  
  - name: WhatsApp
    icon: https://raw.githubusercontent.com/Vbaethon/HOMOMIX/main/Icon/Color/Large/WhatsApp.png
    type: select
    remnawave:
      include-proxies: false
    include-all: true
    exclude-filter: "^🇩🇪"
    proxies:
      - 🔓 No VPN
      - 🏳️‍🌈 Proxy
      - 🇷🇺 Proxy
    use:
      - subscription

  - name: 🔓 No VPN
    type: select
    hidden: true
    remnawave:
      include-proxies: false
    proxies:
      - DIRECT

  - name: 🏳️‍🌈 Fastest
    type: url-test
    hidden: true
    tolerance: 150
    url: https://www.gstatic.com/generate_204
    interval: 300
    remnawave:
      include-proxies: false
    include-all: true
    exclude-filter: "^🇷🇺 \\w+|^🇩🇪"
    proxies:
    use:
      - subscription

  - name: 🇷🇺 Fastest
    type: url-test
    hidden: true
    tolerance: 150
    url: https://www.gstatic.com/generate_204
    interval: 300
    remnawave:
      include-proxies: false
    include-all: true
    exclude-filter: "^[^🇷🇺 \\w+]|^🇷🇺 ➡️"
    proxies:
    use:
      - subscription

  - name: PROXY
    type: select
    hidden: true
    remnawave:
      include-proxies: false
    proxies:
      - 🏳️‍🌈 Proxy

