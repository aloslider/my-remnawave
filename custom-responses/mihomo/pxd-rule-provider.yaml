remnawave:
  includeHiddenHosts: false

x-anchors:
  reserved_ips: &reserved_ips
    - 0.0.0.0/8
    - 10.0.0.0/8
    - 100.64.0.0/10
    - 127.0.0.0/8
    - 169.254.0.0/16
    - 172.16.0.0/12
    - 192.0.0.0/24
    - 192.0.2.0/24
    - 192.88.99.0/24
    - 192.168.0.0/16
    - 198.51.100.0/24
    - 203.0.113.0/24
    - 224.0.0.0/3

  dns_ru: &dns_ru
    - 77.88.8.8
    - 77.88.8.1

  dns_proxy: &dns_proxy
    - https://8.8.8.8/dns-query#PROXY
    - https://1.1.1.1/dns-query#PROXY

  pr_http: &pr_http
    type: http
    interval: 86400
    proxy: PROXY

  rp_classical: &rp_classical
    <<: *pr_http
    behavior: classical
    format: yaml

  rp_domain: &rp_domain
    <<: *pr_http
    behavior: domain
    format: mrs

  rp_ipcidr: &rp_ipcidr
    <<: *pr_http
    behavior: ipcidr
    format: mrs

tcp-concurrent: true
enable-process: true
find-process-mode: strict
mode: rule
log-level: error
ipv6: false
keep-alive-interval: 30
keep-alive-idle: 30
unified-delay: true
geodata-loader: memconservative

profile:
  store-selected: true
  store-fake-ip: true

port: 7890
socks-port: 7891
mixed-port: 7892
allow-lan: false
bind-address: 127.0.0.1
authentication:
  - "ya:sosal"
skip-auth-prefixes: []

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
    TLS:
      ports:
        - 443
        - 8443
  skip-dst-address: *reserved_ips

tun:
  enable: true
  stack: gvisor
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53
  strict-route: true
  route-exclude-address: *reserved_ips
