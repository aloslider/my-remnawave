    url: https://github.com/legiz-ru/mihomo-rule-sets/raw/main/other/torrent-trackers.mrs
    path: ./torrent-trackers.mrs
  torrent-clients:
    <<: *rp_classical
    url: https://github.com/legiz-ru/mihomo-rule-sets/raw/main/other/torrent-clients.yaml
    path: ./torrent-clients.yaml
  whatsapp-domains:
    <<: *rp_domain
    url: https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geosite/whatsapp.mrs
    path: ./whatsapp-domains.mrs
  whitelist:
    <<: *rp_domain
    url: https://cdn.jsdelivr.net/gh/hydraponique/roscomvpn-geosite/release/mihomo/whitelist.mrs
    path: ./whitelist.mrs
  win-spy:
    <<: *rp_domain
    url: https://raw.githubusercontent.com/hydraponique/roscomvpn-geosite/release/mihomo/win-spy.mrs
    path: ./win-spy.mrs
  youtube:
    <<: *rp_domain
    url: https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geosite/youtube.mrs
    path: ./youtube.mrs

rules:
  # Системные/приватные адреса
  - RULE-SET,private-ips,DIRECT,no-resolve
  - RULE-SET,private-domains,DIRECT
  - IP-CIDR,::/0,REJECT-DROP,no-resolve # весь IPv6-трафик, не попавший в fake-ip блок
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT-DROP # QUIC принудительно через TCP
  - OR,((RULE-SET,private-domains),(RULE-SET,geosite-private)),DIRECT # локальные домены напрямую

  # Block
  - OR,((RULE-SET,ads-all),(RULE-SET,category-ads)),REJECT-DROP
  - RULE-SET,win-spy,REJECT-DROP

  # Direct
  - OR,((RULE-SET,torrent-clients),(RULE-SET,torrent-trackers)),DIRECT
  - OR,((DST-PORT,5223),(DOMAIN-SUFFIX,push.apple.com)),DIRECT
  - OR,((DST-PORT,5228-5230),(DOMAIN-KEYWORD,mtalk),(DOMAIN-SUFFIX,fcm.googleapis.com),(DOMAIN-SUFFIX,fcm-xmpp.googleapis.com)),DIRECT
  - OR,((DOMAIN,ads.twitch.tv),(DOMAIN,playlist.ttvnw.net)),DIRECT
  - DOMAIN-SUFFIX,kick.com,DIRECT
  - OR,((RULE-SET,geosite-ru),(RULE-SET,geoip-ru),(RULE-SET,whitelist),(RULE-SET,ru-app-list)),DIRECT # RU
  - RULE-SET,apple,DIRECT
  - RULE-SET,microsoft,DIRECT
  - RULE-SET,pinterest,DIRECT
  - RULE-SET,reddit,DIRECT
  - RULE-SET,steam,DIRECT
  - DOMAIN-SUFFIX,2gis.com,DIRECT
  
  # Games
  - RULE-SET,games,🎮 Games
  - RULE-SET,epicgames,🎮 Games
  - RULE-SET,escapefromtarkov,🎮 Games
  - RULE-SET,faceit,🎮 Games
  - RULE-SET,origin,🎮 Games
  - RULE-SET,riot,🎮 Games
  # OR,((PROCESS-NAME,bf6.exe),(PROCESS-NAME,EAAntiCheat.GameService.exe)),🎮 Games # bf6
  - PROCESS-NAME,bf6.exe,DIRECT
  - PROCESS-NAME,EAAntiCheat.GameService.exe,🎮 Games
  
  # Selectors
  - OR,((PROCESS-NAME,Discord.exe),(PROCESS-NAME,discord),(PROCESS-NAME,vesktop),(RULE-SET,discord-domains),(RULE-SET,discord-voiceips)),Discord
  - OR,((RULE-SET,telegram-domains),(RULE-SET,telegram-ips)),Telegram
  - RULE-SET,youtube,YouTube
  - OR,((RULE-SET,whatsapp-domains),(RULE-SET,meta-ips)),WhatsApp
  
  - MATCH,PROXY
